name: Publish Canary Release to NPM

on:
  push:
    branches:
      - canary
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run canary publish flow with npm publish --dry-run"
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-canary
  cancel-in-progress: false

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Generate canary version
        id: version
        run: |
          # Get the latest published stable version from NPM (fallback to package.json if not published)
          LATEST_NPM_VERSION=$(npm view @0xkoller/demokit version 2>/dev/null || echo "")

          if [ -z "$LATEST_NPM_VERSION" ]; then
            # If package not published yet, use version from package.json and increment patch
            CURRENT_VERSION=$(cat packages/demokit/package.json | grep '"version"' | cut -d'"' -f4)
            echo "Package not published yet, using package.json version: $CURRENT_VERSION"
            # Parse version and increment patch version for canary base
            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            PATCH_INCREMENTED=$((PATCH + 1))
            BASE_VERSION="${MAJOR}.${MINOR}.${PATCH_INCREMENTED}"
            echo "Incremented base version for canary: $BASE_VERSION"
            CANARY_NUMBER=0
          else
            echo "Latest stable NPM version: $LATEST_NPM_VERSION"
            # Parse stable version and increment patch version for canary base
            MAJOR=$(echo "$LATEST_NPM_VERSION" | cut -d. -f1)
            MINOR=$(echo "$LATEST_NPM_VERSION" | cut -d. -f2)
            PATCH=$(echo "$LATEST_NPM_VERSION" | cut -d. -f3)
            PATCH_INCREMENTED=$((PATCH + 1))
            BASE_VERSION="${MAJOR}.${MINOR}.${PATCH_INCREMENTED}"
            echo "Using incremented base version for canary: $BASE_VERSION"

            # Get all published versions and find existing canary versions for this incremented base
            ALL_VERSIONS=$(npm view @0xkoller/demokit versions --json 2>/dev/null || echo "[]")

            # Find the highest canary number for this base version
            HIGHEST_CANARY=$(echo "$ALL_VERSIONS" | jq -r ".[]" | grep "^${BASE_VERSION}-canary\." | sed "s/^${BASE_VERSION}-canary\.//" | sort -n | tail -1)

            if [ -z "$HIGHEST_CANARY" ] || [ "$HIGHEST_CANARY" = "null" ]; then
              # No existing canary versions for this base, start at 0
              CANARY_NUMBER=0
              echo "No existing canary versions found for base $BASE_VERSION, starting at canary.0"
            else
              # Increment from the highest existing canary number
              CANARY_NUMBER=$((HIGHEST_CANARY + 1))
              echo "Found existing canary versions up to canary.$HIGHEST_CANARY, using canary.$CANARY_NUMBER"
            fi
          fi

          # Generate canary version with incremental number per stable version
          CANARY_VERSION="${BASE_VERSION}-canary.${CANARY_NUMBER}"

          echo "version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing canary version: $CANARY_VERSION"

      - name: Update package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update demokit package version
          cd packages/demokit
          npm version "$VERSION" --no-git-tag-version
          echo "✅ Updated demokit version to $VERSION"

          # Update create-demokit-app package version
          cd ../create-demokit-app
          npm version "$VERSION" --no-git-tag-version
          echo "✅ Updated create-demokit-app version to $VERSION"

          # Update init-demokit package version
          cd ../init-demokit
          npm version "$VERSION" --no-git-tag-version
          echo "✅ Updated init-demokit version to $VERSION"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=demokit --filter=create-demokit-app --filter=init-demokit

      - name: Verify build outputs
        run: |
          # Verify demokit package build
          cd packages/demokit
          if [ ! -f "dist/index.js" ] || [ ! -f "dist/index.d.ts" ]; then
            echo "❌ demokit package build verification failed"
            exit 1
          fi
          echo "✅ demokit package build verified"

          # Verify create-demokit-app CLI build
          cd ../create-demokit-app
          if [ ! -f "index.js" ]; then
            echo "❌ create-demokit-app CLI build verification failed"
            exit 1
          fi
          echo "✅ create-demokit-app CLI build verified"

          # Verify init-demokit CLI build
          cd ../init-demokit
          if [ ! -f "dist/index.js" ]; then
            echo "❌ init-demokit CLI build verification failed"
            exit 1
          fi
          echo "✅ init-demokit CLI build verified"

      - name: Publish demokit package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/demokit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              echo "Manual canary publishing is disabled. Use dry_run=true."
              exit 1
            fi
            echo "Dry-run publishing demokit package with canary tag"
            npm publish --access public --tag canary --dry-run
          else
            echo "Publishing demokit package with canary tag"
            npm publish --access public --tag canary
            echo "✅ Successfully published @0xkoller/demokit@${{ steps.version.outputs.version }} with tag canary"
          fi

      - name: Publish create-demokit-app package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/create-demokit-app
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              echo "Manual canary publishing is disabled. Use dry_run=true."
              exit 1
            fi
            echo "Dry-run publishing create-demokit-app package with canary tag"
            npm publish --access public --tag canary --dry-run
          else
            echo "Publishing create-demokit-app package with canary tag"
            npm publish --access public --tag canary
            echo "✅ Successfully published @0xkoller/create-demokit-app@${{ steps.version.outputs.version }} with tag canary"
          fi

      - name: Publish init-demokit package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/init-demokit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              echo "Manual canary publishing is disabled. Use dry_run=true."
              exit 1
            fi
            echo "Dry-run publishing init-demokit package with canary tag"
            npm publish --access public --tag canary --dry-run
          else
            echo "Publishing init-demokit package with canary tag"
            npm publish --access public --tag canary
            echo "✅ Successfully published @0xkoller/init-demokit@${{ steps.version.outputs.version }} with tag canary"
          fi

      - name: Create publish summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # Canary Release Published

          **Canary version \`${{ steps.version.outputs.version }}\`** published:

          - **@0xkoller/demokit@${{ steps.version.outputs.version }}** - [View on NPM](https://www.npmjs.com/package/@0xkoller/demokit)
          - **@0xkoller/create-demokit-app@${{ steps.version.outputs.version }}** - [View on NPM](https://www.npmjs.com/package/@0xkoller/create-demokit-app)
          - **@0xkoller/init-demokit@${{ steps.version.outputs.version }}** - [View on NPM](https://www.npmjs.com/package/@0xkoller/init-demokit)

          **Install canary version:**
          \`\`\`bash
          npm install @0xkoller/demokit@${{ steps.version.outputs.version }}
          \`\`\`

          This is a canary release. Use with caution in production.
          EOF
